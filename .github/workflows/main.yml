name: Release Lottery App

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'         # 打 v 开头标签自动触发

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: 'v__VERSION__'
          releaseName: '年会抽奖 v__VERSION__'
          releaseBody: '自动构建的年会抽奖安装包'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          renameArtifacts: '年会抽奖'
